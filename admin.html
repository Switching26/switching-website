<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="images/fav-sf-web.PNG">
<title>Admin — Switching Formation</title>
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#FAFBFC;--surface:#FFFFFF;--surface2:#F1F5F9;
--text:#1E293B;--sub:#64748B;--muted:#94A3B8;
--accent:#10ABAF;--accent2:#0E9599;--accent-gl:rgba(16,171,175,.12);--accent-gl2:rgba(16,171,175,.06);
--bd:rgba(0,0,0,.06);--bd2:rgba(0,0,0,.08);
--r:16px;--rs:12px;--rf:100px;
--f:'Almarai',sans-serif;--e:cubic-bezier(.16,1,.3,1);
}
html{scroll-behavior:smooth}
body{font-family:var(--f);color:var(--text);background:var(--bg);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}

/* LOGIN */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:var(--surface);border:1px solid var(--bd);border-radius:var(--r);padding:48px 40px;max-width:400px;width:100%;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.06)}
.login-box img{height:42px;margin-bottom:28px}
.login-box h1{font-family:'Poppins',sans-serif;font-size:24px;font-weight:600;color:#0F172A;margin-bottom:6px;letter-spacing:-.02em}
.login-box p{font-size:13px;color:var(--muted);margin-bottom:28px}
.login-input{width:100%;padding:14px 18px;border:1px solid var(--bd2);border-radius:var(--rs);font-size:16px;font-family:var(--f);color:var(--text);text-align:center;letter-spacing:.3em;transition:all .2s;background:var(--surface)}
.login-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-gl)}
.login-input::placeholder{letter-spacing:normal;color:var(--muted)}
.login-btn{width:100%;margin-top:16px;padding:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:var(--rf);font-size:15px;font-weight:700;font-family:var(--f);cursor:pointer;transition:all .3s var(--e);box-shadow:0 2px 12px var(--accent-gl)}
.login-btn:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 4px 20px rgba(16,171,175,.3)}
.login-error{color:#F43F5E;font-size:13px;margin-top:12px;display:none}

/* DASHBOARD */
.dash{display:none;padding:24px 32px}
.dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;padding-bottom:20px;border-bottom:1px solid var(--bd)}
.dash-logo-title{display:flex;align-items:center;gap:16px}
.dash-header img{height:36px}
.dash-title{font-family:'Poppins',sans-serif;font-size:22px;font-weight:600;color:#0F172A;letter-spacing:-.02em}
.dash-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.dash-btn{padding:9px 20px;border-radius:var(--rf);font-size:13px;font-weight:600;font-family:var(--f);cursor:pointer;transition:all .2s var(--e);border:1px solid var(--bd2);background:var(--surface);color:var(--sub)}
.dash-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-gl2)}
.dash-btn.danger{border-color:#F43F5E;color:#F43F5E}.dash-btn.danger:hover{background:rgba(244,63,94,.06)}
.dash-logout{padding:9px 20px;border-radius:var(--rf);font-size:13px;font-weight:600;font-family:var(--f);cursor:pointer;border:none;background:var(--surface2);color:var(--sub);transition:all .2s}
.dash-logout:hover{color:var(--text)}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.stat-card{background:var(--surface);border:1px solid var(--bd);border-radius:var(--r);padding:24px 20px;transition:all .3s var(--e)}
.stat-card:hover{border-color:rgba(16,171,175,.15);box-shadow:0 4px 16px rgba(0,0,0,.04)}
.stat-num{font-family:'Poppins',sans-serif;font-size:32px;font-weight:700;color:var(--accent);letter-spacing:-.02em;line-height:1}
.stat-label{font-size:12px;color:var(--muted);margin-top:6px;font-weight:500}

/* TABLE */
.table-wrap{background:var(--surface);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.table-head{padding:18px 24px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.table-title{font-family:'Poppins',sans-serif;font-size:16px;font-weight:600;color:#0F172A}
.table-count{font-size:12px;color:var(--muted);font-weight:500}
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:12px 24px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--bd);background:var(--bg)}
td{padding:14px 24px;font-size:13px;color:var(--sub);border-bottom:1px solid var(--bd)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--accent-gl2)}
.badge{display:inline-block;padding:3px 10px;border-radius:var(--rf);font-size:11px;font-weight:600;letter-spacing:.02em;white-space:nowrap}
.badge-secteur{background:rgba(59,130,246,.08);color:#3B82F6;border:1px solid rgba(59,130,246,.15)}
.badge-statut{background:rgba(16,185,129,.08);color:#10B981;border:1px solid rgba(16,185,129,.15)}
.badge-fin{background:rgba(245,158,11,.08);color:#F59E0B;border:1px solid rgba(245,158,11,.15)}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty svg{width:48px;height:48px;margin-bottom:16px;opacity:.3}
.empty p{font-size:14px}

/* MOBILE CARDS (hidden on desktop) */
.mobile-cards{display:none}
.mob-card{background:var(--surface);border:1px solid var(--bd);border-radius:var(--r);padding:20px;margin-bottom:12px;transition:all .35s var(--e)}
.mob-card:hover{border-color:rgba(16,171,175,.2);box-shadow:0 8px 28px rgba(0,0,0,.07);transform:translateY(-2px)}
.mob-card.unread{background:rgba(16,171,175,.03);border-color:rgba(16,171,175,.12)}
.mob-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.mob-card-name{font-family:'Poppins',sans-serif;font-size:15px;font-weight:600;color:#0F172A;letter-spacing:-.01em}
.mob-card-date{font-size:11px;color:var(--muted);font-weight:500;white-space:nowrap;margin-left:12px;flex-shrink:0}
.mob-card-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:13px;color:var(--sub)}
.mob-card-row:last-child{margin-bottom:0}
.mob-card-row svg{width:15px;height:15px;flex-shrink:0;color:var(--muted)}
.mob-card-row a{color:var(--accent);text-decoration:none}
.mob-card-badges{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0}
.mob-card-source{font-size:11px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.06em}
.mob-card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding-top:12px;border-top:1px solid var(--bd)}
.mob-card-del{padding:6px 14px;border-radius:var(--rf);font-size:11px;font-weight:600;font-family:var(--f);cursor:pointer;transition:all .2s var(--e);border:1px solid rgba(244,63,94,.25);background:transparent;color:#F43F5E}
.mob-card-del:hover{background:rgba(244,63,94,.06);border-color:#F43F5E}

/* ===== TABLET (max-width: 1024px) ===== */
@media(max-width:1024px){
.stats-row{grid-template-columns:repeat(2,1fr)}
.dash{padding:20px 24px}
.table-scroll{overflow-x:auto}
table{min-width:900px}
}

/* ===== MOBILE (max-width: 768px) ===== */
@media(max-width:768px){
.stats-row{grid-template-columns:repeat(2,1fr);gap:10px}
.dash{padding:16px}

/* Header: stack vertically */
.dash-header{flex-direction:column;align-items:center;gap:16px;text-align:center}
.dash-logo-title{justify-content:center}
.dash-actions{justify-content:center;flex-wrap:wrap;gap:8px}
.dash-btn{padding:7px 14px;font-size:12px}
.dash-logout{padding:7px 14px;font-size:12px}
.dash-title{font-size:18px}

/* Stats */
.stat-card{padding:18px 16px}
.stat-num{font-size:26px}

/* Table: hide desktop table, show mobile cards */
.table-scroll{display:none}
.mobile-cards{display:block;padding:4px 16px 16px}

/* Table head adjustments */
.table-head{padding:14px 16px}
.table-title{font-size:14px}

.login-box{padding:32px 24px}
}

/* ===== EXTRA SMALL (max-width: 480px) ===== */
@media(max-width:480px){
.dash{padding:12px}
.dash-header{gap:12px;padding-bottom:16px;margin-bottom:20px}
.dash-header img{height:30px}
.dash-title{font-size:16px}
.dash-actions{gap:6px}
.dash-btn{padding:6px 12px;font-size:11px}
.dash-logout{padding:6px 12px;font-size:11px}

.stats-row{grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.stat-card{padding:14px 12px}
.stat-num{font-size:22px}
.stat-label{font-size:11px;margin-top:4px}

.mobile-cards{padding:4px 12px 12px}
.mob-card{padding:16px}
.mob-card-name{font-size:14px}
.mob-card-row{font-size:12px}
.mob-card-badges{gap:4px}
.badge{font-size:10px;padding:2px 8px}

.table-head{padding:12px}
.table-title{font-size:13px}
.table-count{font-size:11px}

.login-box{padding:24px 18px}
.login-box h1{font-size:20px}
.login-box img{height:36px;margin-bottom:20px}
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-wrap" id="loginScreen">
<div class="login-box">
<img src="images/logo-switching.png" alt="Switching Formation">
<h1>Espace administrateur</h1>
<p>Entrez votre code d'accès pour continuer.</p>
<input type="password" class="login-input" id="codeInput" placeholder="Code d'accès" maxlength="20" autofocus>
<button class="login-btn" id="loginBtn">Accéder</button>
<div class="login-error" id="loginError">Code incorrect. Veuillez réessayer.</div>
</div>
</div>

<!-- DASHBOARD -->
<div class="dash" id="dashboard">
<div class="dash-header">
<div class="dash-logo-title">
<img src="images/logo-switching.png" alt="SF">
<div class="dash-title">Administration</div>
</div>
<div class="dash-actions">
<button class="dash-btn" id="exportBtn">Exporter CSV</button>
<button class="dash-btn danger" id="clearBtn">Tout supprimer</button>
<button class="dash-logout" id="logoutBtn">Déconnexion</button>
</div>
</div>

<div class="stats-row">
<div class="stat-card"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Total demandes</div></div>
<div class="stat-card"><div class="stat-num" id="statToday">0</div><div class="stat-label">Aujourd'hui</div></div>
<div class="stat-card"><div class="stat-num" id="statWeek">0</div><div class="stat-label">Cette semaine</div></div>
<div class="stat-card"><div class="stat-num" id="statTop">—</div><div class="stat-label">Secteur le plus demandé</div></div>
</div>

<div class="table-wrap">
<div class="table-head">
<div class="table-title">Demandes de contact</div>
<div class="table-count" id="tableCount"></div>
</div>
<div id="tableBody"></div>
</div>
</div>

<script>
// ADMIN CODE — Change this hash to set your password
// Default: "switching2026" -> SHA-256 hash
var ADMIN_HASH='8996bd75d6e4094d491883145c6e5c510698072c853c0e86ff817fdad44aaf44';

async function sha256(str){
  var buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0')}).join('');
}

// LOGIN
document.getElementById('loginBtn').addEventListener('click',tryLogin);
document.getElementById('codeInput').addEventListener('keydown',function(e){if(e.key==='Enter')tryLogin()});

var adminCode='';

async function tryLogin(){
  var code=document.getElementById('codeInput').value;
  // Verify against server
  try{
    var r=await fetch('/api/stats',{headers:{'X-Admin-Token':code}});
    if(r.ok){
      adminCode=code;
      sessionStorage.setItem('sf_admin_code',code);
      showDash();
    } else {
      document.getElementById('loginError').style.display='block';
      document.getElementById('codeInput').value='';
      document.getElementById('codeInput').focus();
    }
  }catch(e){
    document.getElementById('loginError').style.display='block';
  }
}

// Check session
var savedCode=sessionStorage.getItem('sf_admin_code');
if(savedCode){adminCode=savedCode;showDash();}

function authHeaders(){return{'X-Admin-Token':adminCode,'Content-Type':'application/json'}}

function showDash(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('dashboard').style.display='block';
  renderDash();
}

// LOGOUT
document.getElementById('logoutBtn').addEventListener('click',function(){
  sessionStorage.removeItem('sf_admin_code');
  adminCode='';
  location.reload();
});

// Helper: escape HTML
function esc(str){
  if(!str)return '';
  var d=document.createElement('div');
  d.textContent=str;
  return d.innerHTML;
}

// RENDER
async function renderDash(){
  try{
    var [statsRes,subsRes]=await Promise.all([
      fetch('/api/stats',{headers:authHeaders()}),
      fetch('/api/submissions',{headers:authHeaders()})
    ]);
    var stats=await statsRes.json();
    var subs=await subsRes.json();
  }catch(e){return;}

  // Stats
  document.getElementById('statTotal').textContent=stats.total;
  document.getElementById('statToday').textContent=stats.today;
  document.getElementById('statWeek').textContent=stats.week;
  document.getElementById('statTop').textContent=stats.topSecteur||'—';
  document.getElementById('tableCount').textContent=stats.total+' demande'+(stats.total>1?'s':'');

  // Table body container
  var el=document.getElementById('tableBody');
  if(subs.length===0){
    el.innerHTML='<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/><path d="M12 18v-6"/><path d="M9 15h6"/></svg><p>Aucune demande pour le moment.</p></div>';
    return;
  }

  // Build desktop table
  var tableHtml='<div class="table-scroll"><table><thead><tr><th>Date</th><th>Prénom</th><th>Nom</th><th>E-mail</th><th>Téléphone</th><th>Secteur</th><th>Statut</th><th>Financement</th><th>Source</th><th></th></tr></thead><tbody>';

  // Build mobile cards
  var cardsHtml='<div class="mobile-cards">';

  subs.forEach(function(s){
    var d=s.date?new Date(s.date):null;
    var dateStr=d?d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'})+' '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}):'—';
    var rowClass=s.lu?'':'style="background:rgba(16,171,175,.03)"';

    // Desktop table row
    tableHtml+='<tr '+rowClass+' data-id="'+s.id+'">';
    tableHtml+='<td>'+dateStr+'</td>';
    tableHtml+='<td><b>'+esc(s.prenom||'—')+'</b></td>';
    tableHtml+='<td><b>'+esc(s.nom||'—')+'</b></td>';
    tableHtml+='<td>'+esc(s.email||'—')+'</td>';
    tableHtml+='<td>'+esc(s.indicatif?s.indicatif+' ':'')+esc(s.tel||'—')+'</td>';
    tableHtml+='<td>'+(s.secteur?'<span class="badge badge-secteur">'+esc(s.secteur)+'</span>':'—')+'</td>';
    tableHtml+='<td>'+(s.statut?'<span class="badge badge-statut">'+esc(s.statut)+'</span>':'—')+'</td>';
    tableHtml+='<td>'+(s.financement?'<span class="badge badge-fin">'+esc(s.financement)+'</span>':'—')+'</td>';
    tableHtml+='<td>'+esc(s.source||'—')+'</td>';
    tableHtml+='<td><button class="dash-btn" onclick="deleteSub('+s.id+')" style="padding:4px 10px;font-size:11px">Suppr.</button></td>';
    tableHtml+='</tr>';

    // Mobile card
    var unreadClass=s.lu?'':'unread';
    var fullName=esc(s.prenom||'')+' '+esc(s.nom||'');
    fullName=fullName.trim()||'—';

    cardsHtml+='<div class="mob-card '+unreadClass+'" data-id="'+s.id+'">';

    // Top: name + date
    cardsHtml+='<div class="mob-card-top">';
    cardsHtml+='<div class="mob-card-name">'+fullName+'</div>';
    cardsHtml+='<div class="mob-card-date">'+dateStr+'</div>';
    cardsHtml+='</div>';

    // Email row
    if(s.email){
      cardsHtml+='<div class="mob-card-row">';
      cardsHtml+='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>';
      cardsHtml+='<a href="mailto:'+esc(s.email)+'">'+esc(s.email)+'</a>';
      cardsHtml+='</div>';
    }

    // Phone row
    var phone=(s.indicatif?s.indicatif+' ':'')+(s.tel||'');
    if(phone.trim()){
      cardsHtml+='<div class="mob-card-row">';
      cardsHtml+='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>';
      cardsHtml+='<a href="tel:'+esc(phone.replace(/\s/g,''))+'">'+esc(phone)+'</a>';
      cardsHtml+='</div>';
    }

    // Badges
    if(s.secteur||s.statut||s.financement){
      cardsHtml+='<div class="mob-card-badges">';
      if(s.secteur)cardsHtml+='<span class="badge badge-secteur">'+esc(s.secteur)+'</span>';
      if(s.statut)cardsHtml+='<span class="badge badge-statut">'+esc(s.statut)+'</span>';
      if(s.financement)cardsHtml+='<span class="badge badge-fin">'+esc(s.financement)+'</span>';
      cardsHtml+='</div>';
    }

    // Footer: source + delete
    cardsHtml+='<div class="mob-card-footer">';
    cardsHtml+='<div class="mob-card-source">'+(s.source?esc(s.source):'')+'</div>';
    cardsHtml+='<button class="mob-card-del" onclick="deleteSub('+s.id+')">Supprimer</button>';
    cardsHtml+='</div>';

    cardsHtml+='</div>';

    // Mark as read
    if(!s.lu)fetch('/api/submissions/'+s.id+'/read',{method:'PATCH',headers:authHeaders()}).catch(function(){});
  });

  tableHtml+='</tbody></table></div>';
  cardsHtml+='</div>';

  el.innerHTML=tableHtml+cardsHtml;
}

// DELETE ONE
async function deleteSub(id){
  if(!confirm('Supprimer cette demande ?'))return;
  await fetch('/api/submissions/'+id,{method:'DELETE',headers:authHeaders()});
  renderDash();
}

// EXPORT CSV
document.getElementById('exportBtn').addEventListener('click',function(){
  window.open('/api/export?token='+encodeURIComponent(adminCode));
});

// CLEAR ALL
document.getElementById('clearBtn').addEventListener('click',async function(){
  if(confirm('Supprimer toutes les demandes ? Cette action est irréversible.')){
    await fetch('/api/submissions',{method:'DELETE',headers:authHeaders()});
    renderDash();
  }
});
</script>
</body>
</html>
