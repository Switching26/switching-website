*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

html{scroll-behavior:smooth}
body{font-family:var(--f);color:var(--text);background:var(--bg);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;display:flex;flex-direction:column;min-height:100vh}

.error-page{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px 24px;position:relative}
.error-page::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 40%,rgba(16,171,175,.06),transparent);pointer-events:none}
.error-content{position:relative;z-index:1;max-width:480px}
.error-code{font-family:'Poppins',sans-serif;font-size:120px;font-weight:800;letter-spacing:-.06em;line-height:1;background:linear-gradient(135deg,var(--accent),#0E9599,#3DC8C9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:16px}
.error-title{font-family:'Poppins',sans-serif;font-size:24px;font-weight:600;color:#0F172A;letter-spacing:-.02em;margin-bottom:12px}
.error-text{font-size:15px;color:var(--sub);line-height:1.7;margin-bottom:32px}
.error-links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-back{background:var(--accent);color:#fff;padding:12px 28px;border-radius:var(--rf);font-weight:700;font-size:14px;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:all .3s var(--e);box-shadow:0 0 20px var(--accent-gl)}
.btn-back:hover{filter:brightness(1.15);transform:translateY(-2px);box-shadow:0 0 40px rgba(16,171,175,.25)}
.btn-back svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.btn-contact{background:transparent;color:var(--text);padding:12px 28px;border-radius:var(--rf);font-weight:600;font-size:14px;text-decoration:none;border:1px solid var(--bd);transition:all .3s var(--e)}
.btn-contact:hover{border-color:var(--accent);color:var(--accent);background:rgba(16,171,175,.04)}
@media(max-width:768px){.error-code{font-size:80px}.error-title{font-size:20px}}
